<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="STACKLY Portal Dashboard - Tailored to your active organizational workspace.">
    <title>Workspace Dashboard | STACKLY Business Solutions</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">

    <style>
        :root {
            --sidebar-width: 260px;
            --header-height: 70px;
            --card-bg: #ffffff;
            --border-glow: rgba(37, 99, 235, 0.08);
        }

        body {
            background: #ffffff !important;
            color: var(--dark-text);
            min-height: 100vh;
            display: flex;
            overflow-x: hidden;
        }

        /* Dashboard Layout */
        .dash-sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            background: #ffffff;
            border-right: 1px solid var(--gray-bg);
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transition: var(--transition);
        }

        .dash-logo {
            height: var(--header-height);
            display: flex;
            align-items: center;
            padding: 0 24px;
            border-bottom: 1px solid var(--gray-bg);
        }

        .dash-logo img {
            height: 36px;
            width: auto;
            filter: brightness(0) saturate(100%) invert(31%) sepia(93%) saturate(3015%) hue-rotate(216deg) brightness(96%) contrast(96%) drop-shadow(0 2px 4px rgba(37, 99, 235, 0.1));
        }

        .user-profile-section {
            padding: 24px;
            border-bottom: 1px solid var(--gray-bg);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--blue), var(--cyan));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: var(--white);
            font-size: 16px;
            box-shadow: 0 4px 10px rgba(37, 99, 235, 0.15);
            border: 2px solid #ffffff;
        }

        .user-info {
            overflow: hidden;
        }

        .user-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--blue-dark);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .user-role-badge {
            display: inline-block;
            font-size: 11px;
            font-weight: 700;
            color: var(--blue);
            background: rgba(37, 99, 235, 0.08);
            padding: 2px 8px;
            border-radius: 20px;
            margin-top: 4px;
            border: 1px solid rgba(37, 99, 235, 0.15);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .sidebar-menu {
            padding: 20px 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
            overflow-y: auto;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: var(--gray);
            font-size: 14px;
            font-weight: 500;
            border-radius: var(--radius-sm);
            transition: var(--transition);
            cursor: pointer;
        }

        .sidebar-link svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
        }

        .sidebar-link:hover {
            color: var(--blue);
            background: var(--light);
        }

        .sidebar-link.active {
            background: rgba(37, 99, 235, 0.08);
            color: var(--blue);
            border-left: 3px solid var(--blue);
            box-shadow: none;
        }

        .sidebar-footer {
            padding: 16px 12px;
            border-top: 1px solid var(--gray-bg);
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .btn-logout {
            color: var(--error);
            border: 1px solid rgba(239, 68, 68, 0.15);
            background: rgba(239, 68, 68, 0.05);
        }

        .btn-logout:hover {
            background: rgba(239, 68, 68, 0.15);
            color: var(--error) !important;
            border-color: var(--error);
        }

        /* Main Workspace Content Area */
        .dash-main {
            margin-left: var(--sidebar-width);
            flex: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: var(--transition);
            background: #f8fafc;
        }

        .dash-header {
            height: var(--header-height);
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--gray-bg);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            position: sticky;
            top: 0;
            z-index: 90;
        }

        .dash-header-title h1 {
            font-size: 20px;
            font-weight: 700;
            color: var(--blue);
        }

        .dash-header-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .dash-content {
            padding: 40px;
            flex: 1;
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
        }

        /* Dashboard Widgets / Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--gray-bg);
            border-radius: var(--radius-md);
            padding: 24px;
            box-shadow: var(--shadow-sm);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            overflow: hidden;
            transition: var(--transition);
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--blue);
        }

        .stat-card.cyan::before { background: var(--cyan); }
        .stat-card.purple::before { background: var(--accent); }
        .stat-card.success::before { background: var(--success); }

        .stat-card:hover {
            transform: translateY(-3px);
            border-color: var(--blue-light);
            box-shadow: var(--shadow-md);
        }

        .stat-card-info h3 {
            font-size: 13px;
            font-weight: 600;
            color: var(--gray);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .stat-card-value {
            font-size: 28px;
            font-weight: 800;
            color: var(--blue-dark);
            line-height: 1;
        }

        .stat-card-icon {
            width: 48px;
            height: 48px;
            border-radius: var(--radius-sm);
            background: var(--light);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--cyan);
            border: 1px solid var(--gray-bg);
        }

        .stat-card-icon svg {
            width: 24px;
            height: 24px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
        }

        /* Card panels */
        .grid-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
            margin-bottom: 32px;
        }

        .dash-panel {
            background: var(--card-bg);
            border: 1px solid var(--gray-bg);
            border-radius: var(--radius-md);
            padding: 30px;
            box-shadow: var(--shadow-sm);
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--gray-bg);
            padding-bottom: 16px;
        }

        .panel-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--blue);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Dynamic action buttons */
        .dash-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            background: linear-gradient(135deg, var(--blue), var(--cyan));
            color: var(--white);
            font-size: 13px;
            font-weight: 600;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 10px rgba(6, 182, 212, 0.2);
        }

        .dash-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(6, 182, 212, 0.4);
        }

        .dash-btn-outline {
            background: #ffffff;
            border: 1px solid var(--gray-lighter);
            color: var(--dark-text);
        }

        .dash-btn-outline:hover {
            background: var(--light);
            border-color: var(--gray-light);
            color: var(--navy);
            transform: translateY(-1px);
        }

        /* Mock data structures */
        .dash-table {
            width: 100%;
            border-collapse: collapse;
        }

        .dash-table th {
            text-align: left;
            padding: 12px 16px;
            font-size: 12px;
            font-weight: 600;
            color: var(--gray);
            text-transform: uppercase;
            border-bottom: 1px solid var(--gray-bg);
        }

        .dash-table td {
            padding: 16px;
            font-size: 14px;
            color: var(--dark-text);
            border-bottom: 1px solid var(--gray-bg);
        }

        .dash-table tr:last-child td {
            border-bottom: none;
        }

        .status-pill {
            display: inline-block;
            font-size: 11px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 10px;
        }

        .status-pill.success { background: rgba(16, 185, 129, 0.15); color: var(--success); }
        .status-pill.warning { background: rgba(245, 158, 11, 0.15); color: var(--warning); }
        .status-pill.error { background: rgba(239, 68, 68, 0.15); color: var(--error); }

        /* Mobile Hamburger & Sidebar states */
        .dash-toggle {
            display: none;
            cursor: pointer;
            background: none;
            color: var(--navy);
        }

        .dash-toggle svg {
            width: 24px;
            height: 24px;
        }

        /* Logs visual console */
        .log-console {
            background: #080c14;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: var(--radius-sm);
            padding: 16px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 12px;
            color: #10b981;
            height: 200px;
            overflow-y: auto;
            margin-top: 16px;
        }

        .log-line {
            margin-bottom: 6px;
            line-height: 1.4;
        }

        .log-line span.time { color: var(--gray); margin-right: 8px; }
        .log-line span.warn { color: var(--warning); }
        .log-line span.error { color: var(--error); }

        /* Custom forms */
        .form-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 16px;
        }

        .form-control-dash {
            width: 100%;
            background: #ffffff;
            border: 1px solid var(--gray-lighter);
            color: var(--dark-text);
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            font-size: 13px;
        }

        .form-control-dash:focus {
            border-color: var(--cyan);
        }

        /* Control Center Grid and Cards */
        .control-center-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 24px;
            margin-top: 20px;
        }

        .role-card {
            background: #ffffff;
            border: 1px solid var(--gray-bg);
            border-radius: 16px;
            padding: 32px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }

        .role-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            transition: all 0.4s ease;
        }

        /* Specific colors */
        .role-card.admin-card::before { background: linear-gradient(90deg, #ef4444, #f87171); }
        .role-card.manager-card::before { background: linear-gradient(90deg, #3b82f6, #60a5fa); }
        .role-card.employee-card::before { background: linear-gradient(90deg, #8b5cf6, #a78bfa); }
        .role-card.client-card::before { background: linear-gradient(90deg, #10b981, #34d399); }
        .role-card.partner-card::before { background: linear-gradient(90deg, #f59e0b, #fbbf24); }

        .role-card:hover {
            transform: translateY(-8px);
            border-color: var(--blue-light);
            box-shadow: var(--shadow-lg);
        } 

        .role-card.admin-card:hover { border-color: rgba(37, 99, 235, 0.4) !important; box-shadow: 0 10px 30px rgba(37, 99, 235, 0.1), 0 20px 40px rgba(0,0,0,0.05); }
        .role-card.manager-card:hover { border-color: rgba(37, 99, 235, 0.4) !important; box-shadow: 0 10px 30px rgba(37, 99, 235, 0.1), 0 20px 40px rgba(0,0,0,0.05); }
        .role-card.employee-card:hover { border-color: rgba(37, 99, 235, 0.4) !important; box-shadow: 0 10px 30px rgba(37, 99, 235, 0.1), 0 20px 40px rgba(0,0,0,0.05); }
        .role-card.client-card:hover { border-color: rgba(37, 99, 235, 0.4) !important; box-shadow: 0 10px 30px rgba(37, 99, 235, 0.1), 0 20px 40px rgba(0,0,0,0.05); }
        .role-card.partner-card:hover { border-color: rgba(37, 99, 235, 0.4) !important; box-shadow: 0 10px 30px rgba(37, 99, 235, 0.1), 0 20px 40px rgba(0,0,0,0.05); }

        .role-icon-wrapper {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            background: var(--light);
            border: 1px solid var(--gray-bg);
            transition: all 0.4s ease;
        }

        .role-card:hover .role-icon-wrapper {
            transform: scale(1.1);
            background: var(--gray-bg);
        }

        .role-card.admin-card .role-icon-wrapper { color: #f87171; }
        .role-card.manager-card .role-icon-wrapper { color: #60a5fa; }
        .role-card.employee-card .role-icon-wrapper { color: #a78bfa; }
        .role-card.client-card .role-icon-wrapper { color: #34d399; }
        .role-card.partner-card .role-icon-wrapper { color: #fbbf24; }

        .role-icon-wrapper svg {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
        }

        .role-card h3 {
            font-size: 16px;
            font-weight: 700;
            color: var(--blue-dark);
            margin-bottom: 10px;
        }

        .role-card p {
            font-size: 12px;
            color: var(--gray);
            line-height: 1.6;
            margin-bottom: 20px;
            flex-grow: 1;
        }

        .role-sim-btn {
            background: var(--light);
            border: 1px solid var(--gray-bg);
            color: var(--dark-text);
            font-size: 11px;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 20px;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .role-card:hover .role-sim-btn {
            background: linear-gradient(135deg, var(--blue), var(--cyan));
            border-color: transparent;
            color: var(--white);
            box-shadow: 0 4px 15px rgba(6, 182, 212, 0.3);
        }

        /* Back Button styling */
        .btn-back-cc {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--blue);
            background: rgba(37, 99, 235, 0.08);
            border: 1px solid rgba(37, 99, 235, 0.15);
            padding: 6px 12px;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-right: 12px;
        }

        .btn-back-cc:hover {
            background: rgba(37, 99, 235, 0.15);
            border-color: var(--blue);
            color: var(--blue-dark);
            transform: translateX(-2px);
        }

        /* Header User Profile Widget */
        .header-user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            padding: 4px 10px;
            border-radius: var(--radius-sm);
            transition: var(--transition);
            margin-left: 12px;
            border: 1px solid transparent;
        }

        .header-user-profile:hover {
            background: var(--light);
            border-color: var(--gray-bg);
        }

        .header-avatar {
            width: 32px !important;
            height: 32px !important;
            font-size: 13px !important;
            border: 1.5px solid #ffffff !important;
            box-shadow: 0 2px 5px rgba(37, 99, 235, 0.15) !important;
        }

        .header-user-info {
            display: flex;
            flex-direction: column;
            line-height: 1.25;
            text-align: left;
        }

        .header-user-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--blue-dark);
            white-space: nowrap;
        }

        .header-role-badge {
            font-size: 9px;
            font-weight: 700;
            color: var(--blue);
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-top: 1px;
        }

        /* User Dropdown Menu */
        .user-dropdown-menu {
            position: absolute;
            top: 100%;
            right: 0;
            margin-top: 8px;
            background: #ffffff;
            border: 1px solid var(--gray-bg);
            border-radius: var(--radius-sm);
            box-shadow: var(--shadow-lg);
            width: 180px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(10px);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
            padding: 6px;
        }

        .user-dropdown-menu.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .dropdown-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            font-size: 13px;
            font-weight: 500;
            color: var(--dark-text);
            border-radius: 6px;
            cursor: pointer;
            transition: var(--transition);
        }

        .dropdown-item svg {
            width: 16px;
            height: 16px;
            color: var(--gray);
            transition: var(--transition);
        }

        .dropdown-item:hover {
            background: var(--light);
            color: var(--blue);
        }

        .dropdown-item:hover svg {
            color: var(--blue);
        }

        .dropdown-item.btn-logout-header {
            color: var(--error);
        }

        .dropdown-item.btn-logout-header svg {
            color: var(--error);
        }

        .dropdown-item.btn-logout-header:hover {
            background: rgba(239, 68, 68, 0.05);
        }

        .dropdown-divider {
            height: 1px;
            background: var(--gray-bg);
            margin: 4px 6px;
        }

        .header-user-profile.active .dropdown-chevron {
            transform: rotate(180deg);
        }

        /* Responsive Media Queries */
        @media (max-width: 1024px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .grid-2 {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .dash-sidebar {
                transform: translateX(-100%);
            }
            .dash-sidebar.open {
                transform: translateX(0);
            }
            .dash-main {
                margin-left: 0;
            }
            .dash-toggle {
                display: block;
            }
            .stats-grid {
                grid-template-columns: 1fr;
            }
            .dash-header {
                padding: 0 24px;
            }
        }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <aside id="sidebar" class="dash-sidebar">
        <div class="dash-logo">
            <a href="index.html">
                <img src="assets/logo.webp" alt="STACKLY">
            </a>
        </div>


        <nav class="sidebar-menu">
           
            
            <!-- Dynamic Navigation Links will go here depending on role -->
            <div id="role-menu-items"></div>
            
            <div class="sidebar-link" onclick="switchView('settings')">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                <span>Settings</span>
            </div>
        </nav>


    </aside>

    <!-- Main Workspace -->
    <main class="dash-main">
        <!-- Top bar header -->
        <header class="dash-header">
            <div style="display: flex; align-items: center; gap: 16px;">
                <button class="dash-toggle" onclick="toggleSidebar()" aria-label="Toggle menu">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                </button>
                <div class="dash-header-title">
                    <h1 id="header-view-title">Portal Dashboard</h1>
                </div>
            </div>
            
            <div class="dash-header-actions">
                <button id="btn-back-admin" class="btn-back-cc" style="display: none;" onclick="exitSimulation()">
                    &larr; Back to Control Center
                </button>
                <span id="live-indicator" style="display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--success); font-weight: 600; margin-right: 8px;">
                    <span style="width: 8px; height: 8px; border-radius: 50%; background-color: var(--success); display: inline-block; animation: pulse 1.5s infinite;"></span>
                    SYSTEM ONLINE

        // Check Session state
        document.addEventListener('DOMContentLoaded', () => {
            const isLoggedIn = localStorage.getItem('is_logged_in');
            if (!isLoggedIn) {
                window.location.href = 'login.html';
                return;
            }

            activeRole = localStorage.getItem('active_role') || 'Admin';
            const userName = localStorage.getItem('user_name') || 'Administrator';
            const userEmail = localStorage.getItem('user_email') || 'admin@stackly.com';


            
            // Fill top-right header user profile info
            document.getElementById('header-user-display-name').innerText = userName;
            document.getElementById('header-user-avatar').innerText = userName.charAt(0).toUpperCase();
            document.getElementById('header-user-role-lbl').innerText = activeRole;

            document.getElementById('set-fname').value = userName.split(' ')[0] || userName;
            document.getElementById('set-lname').value = userName.split(' ')[1] || '';
            document.getElementById('set-email').value = userEmail;

            // Load Workspace
            loadRoleWorkspace(activeRole);

            // Bind Global Click Interceptor (The 404 requirement)
            // "dashboard page ulla irrukura entha button click panalum 404 page ku ponum"
            document.addEventListener('click', (e) => {
                const buttonOrLink = e.target.closest('button, .dash-btn, .dash-btn-outline, a[role="button"]');
                if (buttonOrLink) {
                    // Bypass system control elements:
                    if (buttonOrLink.classList.contains('dash-toggle') || 
                        buttonOrLink.classList.contains('btn-back-cc') ||
                        buttonOrLink.id === 'btn-back-admin') {
                        return; // Let hamburger and simulation exit function
                    }
                    
                    const onclickAttr = buttonOrLink.getAttribute('onclick') || '';
                    if (onclickAttr.includes('toggleSidebar') || 
                        onclickAttr.includes('exitSimulation') || 
                        onclickAttr.includes('handleLogout')) {
                        return; // Let logout and internal sidebar toggles function
                    }

                    // For any action button inside a view, send to 404 page
                    e.preventDefault();
                    window.location.href = '404.html';
                }
            });
        });

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('open');
        }

        function switchView(viewName) {
            const dashboardView = document.getElementById('dashboard-view-content');
            const settingsView = document.getElementById('settings-view-content');
            const links = document.querySelectorAll('.sidebar-link');
            
            links.forEach(l => l.classList.remove('active'));

            if (viewName === 'settings') {
                dashboardView.style.display = 'none';
                settingsView.style.display = 'block';
                document.getElementById('header-view-title').innerText = 'System Settings';
                
                // Highlight settings link in sidebar
                const settingsBtn = Array.from(links).find(l => l.getAttribute('onclick').includes('settings'));
                if (settingsBtn) settingsBtn.classList.add('active');
            } else {
                dashboardView.style.display = 'block';
                settingsView.style.display = 'none';
                
                // Render subview
                const pages = rolePages[activeRole];
                const page = pages.find(p => p.id === viewName) || pages[0];
                dashboardView.innerHTML = page.html;
                document.getElementById('header-view-title').innerText = page.title;
                currentSubView = page.id;

                // Highlight correct link in sidebar
                const activeBtn = Array.from(links).find(l => l.getAttribute('data-view-id') === page.id);
                if (activeBtn) activeBtn.classList.add('active');
            }

            // Close sidebar on mobile after clicking
            document.getElementById('sidebar').classList.remove('open');
        }

        function handleLogout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }

        function loadRoleWorkspace(role) {
            const menuContainer = document.getElementById('role-menu-items');
            
            let sidebarLinks = '';
            rolePages[role].forEach((page, idx) => {
                sidebarLinks += `
                    <div class="sidebar-link ${idx === 0 ? 'active' : ''}" onclick="switchView('${page.id}')" data-view-id="${page.id}">
                        ${page.icon}
                        <span>${page.title}</span>
                    </div>
                `;
            });

            menuContainer.innerHTML = sidebarLinks;
            
            // Render the initial (first) view
            switchView(rolePages[role][0].id);
        }

        function simulateRole(role) {
            window.location.href = '404.html';
        }

        function exitSimulation() {
            const actualRole = localStorage.getItem('active_role') || 'Admin';
            activeRole = actualRole;
            loadRoleWorkspace(actualRole);
            
            // Restore regular badge role label

            document.getElementById('header-user-role-lbl').innerText = actualRole;
            
            // Hide the Back to Control Center button
            document.getElementById('btn-back-admin').style.display = 'none';
        }

        function toggleUserDropdown(event) {
            event.stopPropagation();
            const dropdown = document.getElementById('user-dropdown-menu');
            const profileWidget = event.currentTarget;
            dropdown.classList.toggle('show');
            profileWidget.classList.toggle('active');
        }

        function closeUserDropdown() {
            const dropdown = document.getElementById('user-dropdown-menu');
            const profileWidget = document.querySelector('.header-user-profile');
            if (dropdown) dropdown.classList.remove('show');
            if (profileWidget) profileWidget.classList.remove('active');
        }

        // Close dropdown when clicking outside
        document.addEventListener('click', () => {
            closeUserDropdown();
        });
    </script>
