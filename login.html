<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login or register to access the STACKLY Business Solutions portal. Choose your role to access your custom dashboard.">
    <title>Portal Access | STACKLY Business Solutions</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    
    <style>
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: url('assets/login_bg.png') no-repeat center center/cover;
            padding: 30px 20px;
            overflow-y: auto;
        }

        .login-page::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.9) 0%, rgba(10, 15, 30, 0.85) 100%);
            z-index: 1;
        }

        .login-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 500px;
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: var(--radius-lg);
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            animation: formFadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes formFadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-logo {
            display: inline-block;
            margin-bottom: 15px;
        }

        .login-logo img {
            height: 42px;
            width: auto;
            filter: drop-shadow(0 0 8px rgba(6, 182, 212, 0.4));
        }

        .login-header h2 {
            font-size: 24px;
            font-weight: 700;
            color: var(--white);
            margin-bottom: 8px;
        }

        .login-header p {
            font-size: 14px;
            color: var(--gray-light);
        }

        /* Tabs Switcher */
        .login-tabs {
            display: flex;
            background: rgba(255, 255, 255, 0.05);
            padding: 4px;
            border-radius: var(--radius-sm);
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .login-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            border-radius: var(--radius-sm);
            transition: var(--transition);
        }

        .login-tab.active {
            background: linear-gradient(135deg, var(--blue), var(--cyan));
            color: var(--white);
            box-shadow: 0 4px 15px rgba(6, 182, 212, 0.3);
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-sm);
            color: var(--white);
            font-size: 14px;
            transition: var(--transition);
        }

        .form-input:focus {
            border-color: var(--cyan);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 10px rgba(6, 182, 212, 0.2);
        }

        /* Role Selector Grid */
        .role-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 24px;
        }

        .role-pill {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-sm);
            padding: 10px 6px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .role-pill svg {
            width: 20px;
            height: 20px;
            stroke: rgba(255, 255, 255, 0.5);
            fill: none;
            transition: var(--transition);
        }

        .role-pill span {
            font-size: 11px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.6);
        }

        .role-pill:hover {
            border-color: rgba(6, 182, 212, 0.5);
            background: rgba(255, 255, 255, 0.05);
        }

        .role-pill.active {
            background: rgba(6, 182, 212, 0.1);
            border-color: var(--cyan);
            box-shadow: 0 0 12px rgba(6, 182, 212, 0.25);
        }

        .role-pill.active svg {
            stroke: var(--cyan);
        }

        .role-pill.active span {
            color: var(--cyan);
        }

        /* Register only fields */
        .register-only {
            display: none;
        }

        /* Action Buttons */
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--blue), var(--cyan));
            color: var(--white);
            border-radius: var(--radius-sm);
            font-size: 15px;
            font-weight: 700;
            margin-top: 10px;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(6, 182, 212, 0.5);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .toast-notif {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid var(--cyan);
            border-radius: var(--radius-sm);
            padding: 16px 24px;
            color: var(--white);
            font-size: 14px;
            font-weight: 500;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transform: translateX(120%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .toast-notif.show {
            transform: translateX(0);
        }

        .back-home {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--gray-light);
            margin-top: 24px;
            justify-content: center;
            width: 100%;
            transition: var(--transition);
        }

        .back-home:hover {
            color: var(--cyan);
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
            }
            .role-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .role-pill:last-child {
                grid-column: span 2;
            }
        }
    </style>
</head>
<body>

    <main class="login-page">
        <!-- Toast Notification -->
        <div id="toast" class="toast-notif">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color: var(--cyan);">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="12"></line>
                <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </svg>
            <span id="toast-text">Success! Redirecting...</span>
        </div>

        <div class="login-container">
            <div class="login-header">
                <a href="index.html" class="login-logo">
                    <img src="assets/logo.webp" alt="STACKLY">
                </a>
                <h2 id="form-title">Welcome Back</h2>
                <p id="form-desc">Login to your dashboard to manage your activities</p>
            </div>

            <!-- Form Tabs -->
            <div class="login-tabs">
                <div class="login-tab active" onclick="switchTab('login')">Sign In</div>
                <div class="login-tab" onclick="switchTab('register')">Register</div>
            </div>

            <!-- Login Form -->
            <form id="auth-form" onsubmit="handleAuthSubmit(event)">
                <!-- Registration Specific Field -->
                <div class="form-group register-only">
                    <label for="reg-name">Full Name</label>
                    <div class="input-wrapper">
                        <input type="text" id="reg-name" class="form-input" placeholder="e.g. John Doe">
                    </div>
                </div>

                <div class="form-group">
                    <label for="auth-email">Email Address</label>
                    <div class="input-wrapper">
                        <input type="email" id="auth-email" class="form-input" placeholder="name@company.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="auth-password">Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="auth-password" class="form-input" placeholder="••••••••" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Select Workspace Role</label>
                    <div class="role-grid">
                        <div class="role-pill active" onclick="selectRole('Admin')">
                            <svg viewBox="0 0 24 24" stroke-width="2">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                            </svg>
                            <span>Admin</span>
                        </div>
                        <div class="role-pill" onclick="selectRole('Manager')">
                            <svg viewBox="0 0 24 24" stroke-width="2">
                                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                                <circle cx="9" cy="7" r="4"></circle>
                                <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                                <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                            </svg>
                            <span>Manager</span>
                        </div>
                        <div class="role-pill" onclick="selectRole('Employee')">
                            <svg viewBox="0 0 24 24" stroke-width="2">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                <circle cx="12" cy="7" r="4"></circle>
                            </svg>
                            <span>Employee</span>
                        </div>
                        <div class="role-pill" onclick="selectRole('Client')">
                            <svg viewBox="0 0 24 24" stroke-width="2">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                <polyline points="14 2 14 8 20 8"></polyline>
                                <line x1="16" y1="13" x2="8" y2="13"></line>
                                <line x1="16" y1="17" x2="8" y2="17"></line>
                                <polyline points="10 9 9 9 8 9"></polyline>
                            </svg>
                            <span>Client</span>
                        </div>
                        <div class="role-pill" onclick="selectRole('Partner')">
                            <svg viewBox="0 0 24 24" stroke-width="2">
                                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                            </svg>
                            <span>Partner</span>
                        </div>
                    </div>
                </div>

                <button type="submit" class="submit-btn" id="submit-btn-text">
                    Sign In
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </button>
            </form>

            <a href="index.html" class="back-home">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                Back to Homepage
            </a>
        </div>
    </main>

    <script>
        let currentMode = 'login';
        let selectedRole = 'Admin';

        function switchTab(mode) {
            currentMode = mode;
            
            // Toggle active tabs
            const tabs = document.querySelectorAll('.login-tab');
            tabs.forEach(tab => tab.classList.remove('active'));
            
            if (mode === 'login') {
                tabs[0].classList.add('active');
                document.getElementById('form-title').innerText = 'Welcome Back';
                document.getElementById('form-desc').innerText = 'Login to your dashboard to manage your activities';
                document.getElementById('submit-btn-text').innerHTML = `Sign In <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>`;
                
                // Toggle login background
                document.querySelector('.login-page').style.backgroundImage = "url('assets/login_bg.png')";
                
                // Hide register only fields
                document.querySelectorAll('.register-only').forEach(el => el.style.display = 'none');
                document.getElementById('reg-name').required = false;
            } else {
                tabs[1].classList.add('active');
                document.getElementById('form-title').innerText = 'Create Account';
                document.getElementById('form-desc').innerText = 'Set up a new account on STACKLY and pick a role';
                document.getElementById('submit-btn-text').innerHTML = `Register Workspace <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>`;
                
                // Toggle register background
                document.querySelector('.login-page').style.backgroundImage = "url('assets/register_bg.png')";
                
                // Show register only fields
                document.querySelectorAll('.register-only').forEach(el => el.style.display = 'block');
                document.getElementById('reg-name').required = true;
            }
        }

        function selectRole(role) {
            selectedRole = role;
            
            // Toggle active pills
            const pills = document.querySelectorAll('.role-pill');
            pills.forEach(pill => pill.classList.remove('active'));
            
            // Add active class to clicked pill
            const roleIndex = ['Admin', 'Manager', 'Employee', 'Client', 'Partner'].indexOf(role);
            if (roleIndex !== -1) {
                pills[roleIndex].classList.add('active');
            }
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-text').innerText = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }

        function handleAuthSubmit(e) {
            e.preventDefault();
            
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            let displayName = email.split('@')[0];
            
            if (currentMode === 'register') {
                displayName = document.getElementById('reg-name').value;
            }
            
            // Save state to localstorage
            localStorage.setItem('active_role', selectedRole);
            localStorage.setItem('user_name', displayName);
            localStorage.setItem('user_email', email);
            localStorage.setItem('is_logged_in', 'true');

            showToast(currentMode === 'login' ? `Welcome back, ${displayName}! Loading dashboard...` : `Account registered for ${displayName}! Creating dashboard...`);

            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1500);
        }
    </script>
</body>
</html>
